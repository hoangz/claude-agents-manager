<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="50%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#f1c40f"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde3d0"/>
      <stop offset="100%" stop-color="#fff8f5"/>
    </linearGradient>
  </defs>

  <!-- Left ear spike -->
  <polygon points="18,8 28,38 10,32" fill="#a93226"/>

  <!-- Right ear spike -->
  <polygon points="58,5 62,35 45,28" fill="url(#g2)"/>

  <!-- Main head body — dark red left side -->
  <polygon points="10,32 28,38 42,72 18,85" fill="#b03a2e"/>

  <!-- Main head body — orange right side -->
  <polygon points="28,38 65,42 60,75 42,72" fill="url(#g1)"/>

  <!-- Snout/muzzle pointing right -->
  <polygon points="60,48 82,54 70,62 55,58" fill="url(#g2)"/>

  <!-- White face blaze -->
  <polygon points="38,38 52,40 58,65 44,72" fill="url(#g3)" opacity="0.9"/>

  <!-- Eye -->
  <ellipse cx="52" cy="42" rx="3.5" ry="2.5" fill="white" opacity="0.9"/>
  <ellipse cx="52.5" cy="42" rx="1.5" ry="1.5" fill="#4a1a00"/>

  <!-- Chin/jaw drop -->
  <polygon points="42,72 60,75 52,90 36,88" fill="#c0392b"/>

  <!-- Highlight on top of head -->
  <polygon points="45,28 62,35 58,42 48,36" fill="#f39c12" opacity="0.5"/>
</svg>
