<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="fur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="60%" stop-color="#e8500a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="snout" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8500a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b1a10"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Back of head (dark red) -->
  <path d="M20,75 L15,25 L35,10 L45,45 Z" fill="url(#dark)"/>

  <!-- Ear spike -->
  <path d="M35,10 L55,5 L50,35 L40,30 Z" fill="url(#fur)"/>

  <!-- Inner ear -->
  <path d="M40,15 L52,12 L48,30 L42,27 Z" fill="#f5a623" opacity="0.6"/>

  <!-- Main head -->
  <path d="M45,45 L35,10 L55,5 L80,40 L72,65 L50,70 Z" fill="url(#fur)"/>

  <!-- White face blaze -->
  <path d="M50,30 L58,32 L65,55 L54,62 L46,58 Z" fill="#fce8d5" opacity="0.85"/>

  <!-- Snout pointing right -->
  <path d="M65,48 L88,52 L80,62 L65,58 Z" fill="url(#snout)"/>

  <!-- Nose tip -->
  <ellipse cx="87" cy="53" rx="3" ry="2" fill="#7b1a10"/>

  <!-- Eye -->
  <ellipse cx="60" cy="38" rx="4" ry="3.5" fill="white" opacity="0.9"/>
  <circle cx="61" cy="38" r="2" fill="#2c0a05"/>
  <circle cx="62" cy="37" r="0.7" fill="white"/>

  <!-- Lower jaw / chin drop -->
  <path d="M50,70 L72,65 L65,85 L45,82 Z" fill="#c0392b"/>

  <!-- Shadow under snout -->
  <path d="M65,58 L80,62 L74,68 L60,65 Z" fill="#7b1a10" opacity="0.5"/>
</svg>
